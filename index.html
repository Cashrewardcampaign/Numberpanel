<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Mod Panel</title>
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0e17; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        /* LOGIN PAGE STYLING */
        #loginPage { background: #1a1f2b; padding: 40px 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; }
        #loginPage h2 { color: #00a2ff; margin-bottom: 10px; font-size: 1.8rem; }
        .sub-text { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        
        .login-input { width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #333; border-radius: 12px; background: #0a0e17; color: white; outline: none; font-size: 1rem; }
        .login-input:focus { border-color: #00a2ff; box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }
        
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #0056ff, #00a2ff); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0, 86, 255, 0.4); }
        .login-btn:active { transform: scale(0.98); }
        #loginError { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; background: rgba(255, 77, 77, 0.1); padding: 8px; border-radius: 5px; }

        /* MAIN PANEL (Hidden) */
        #mainPanel { display: none; width: 100%; max-width: 420px; background: #fff; color: #333; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin: 10px; }
        
        .header { background: #0056ff; color: white; padding: 20px; text-align: center; font-size: 1.3rem; font-weight: bold; }
        .status-box { padding: 30px 15px; text-align: center; border-bottom: 8px solid #f8f9fa; }
        #countdown { font-size: 3.5rem; font-weight: 800; color: #0056ff; font-family: 'Courier New', monospace; letter-spacing: 2px; }
        .period-box { color: #555; font-size: 0.95rem; margin-top: 15px; font-weight: 600; background: #eef2ff; display: inline-block; padding: 8px 18px; border-radius: 25px; border: 1px solid #d0d9ff; }
        .next-pred-box { margin-top: 25px; font-size: 1.3rem; font-weight: bold; color: #444; }
        #predictionText { color: #ff4d4d; font-size: 2.2rem; display: block; margin-top: 5px; }

        /* History Table */
        .history-wrap { padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #fdfdfd; padding: 12px; font-size: 0.75rem; color: #999; text-align: left; border-bottom: 1px solid #eee; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f1f1; font-size: 0.95rem; font-weight: 600; }
        .color-red { color: #ff4d4d; }
        .color-green { color: #2ecc71; }
        .color-violet { color: #9c27b0; }
    </style>
</head>
<body>

<div id="loginPage">
    <h2>WinGo Mod</h2>
    <p class="sub-text">Enter credentials to access server</p>
    <input type="text" id="userId" class="login-input" placeholder="User ID">
    <input type="password" id="userPass" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="checkLogin()">Login Panel</button>
    <p id="loginError">⚠️ Invalid ID or Password!</p>
</div>

<div id="mainPanel">
    <div class="header">WIN-GO 1 MIN MOD</div>
    <div class="status-box">
        <div style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Timer Countdown</div>
        <div id="countdown">00:59</div>
        <div class="period-box">P-ID: <span id="periodDisplay">20260406100010001</span></div>
        <div class="next-pred-box">
            Next Prediction
            <b id="predictionText">?</b>
        </div>
    </div>

    <div class="history-wrap">
        <div style="font-weight: bold; color: #222; margin-bottom: 10px;">📊 Result History</div>
        <table>
            <thead>
                <tr><th>Period</th><th>Number</th><th>Result</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Login Logic using Abhay's credentials
    function checkLogin() {
        const id = document.getElementById('userId').value;
        const pass = document.getElementById('userPass').value;
        const error = document.getElementById('loginError');

        // ID & Password set specifically as requested
        if(id === "4537549946" && pass === "Abhaymodder") {
            document.getElementById('loginPage').style.display = "none";
            document.getElementById('mainPanel').style.display = "block";
            document.body.style.backgroundColor = "#f0f2f5"; // Switch to light mode for main panel
            startSmartGame();
        } else {
            error.style.display = "block";
            // Shake effect for error
            document.getElementById('loginPage').style.transform = "translateX(10px)";
            setTimeout(()=> document.getElementById('loginPage').style.transform = "translateX(0)", 100);
        }
    }

    // WinGo Game Logic
    function startSmartGame() {
        let timeLeft = 59;
        let periodSuffix = 1; 
        const periodBase = "20260406100010"; 
        let nextNumber = Math.floor(Math.random() * 10);
        
        const timerDisplay = document.getElementById('countdown');
        const predictionDisplay = document.getElementById('predictionText');
        const periodDisplay = document.getElementById('periodDisplay');
        const historyBody = document.getElementById('historyBody');

        predictionDisplay.innerHTML = nextNumber;

        function updateTimer() {
            let displaySec = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            timerDisplay.innerHTML = `00:${displaySec}`;

            if (timeLeft <= 0) {
                let currentFullID = periodBase + periodSuffix.toString().padStart(3, '0');
                
                // Color and Result logic
                let resT = "", resC = "";
                if (nextNumber === 0 || nextNumber === 5) {
                    resT = "Mix (V)"; resC = "color-violet";
                } else if (nextNumber % 2 === 0) {
                    resT = "Red"; resC = "color-red";
                } else {
                    resT = "Green"; resC = "color-green";
                }
                
                // History update
                const row = `<tr><td>${currentFullID.slice(-5)}</td><td>${nextNumber}</td><td class="${resC}">${resT}</td></tr>`;
                historyBody.insertAdjacentHTML('afterbegin', row);
                if (historyBody.children.length > 7) historyBody.removeChild(historyBody.lastChild);

                // Reset and Increment
                timeLeft = 59;
                periodSuffix = (periodSuffix >= 999) ? 1 : periodSuffix + 1;
                nextNumber = Math.floor(Math.random() * 10);
                
                predictionDisplay.innerHTML = nextNumber;
                periodDisplay.innerHTML = periodBase + periodSuffix.toString().padStart(3, '0');
            } else {
                timeLeft--;
            }
        }
        setInterval(updateTimer, 1000);
    }
</script>

</body>
</html>
